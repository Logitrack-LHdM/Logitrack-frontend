<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../css/head.css">
    <link rel="stylesheet" href="../css/viajeChofer.css">
    <title>LogiTrack | Mi Viaje</title>
</head>

<body class="bg-light d-flex flex-column min-vh-100">

    <header>
        <nav class="navbar py-2 py-md-3 shadow-sm bg-agro-gradient">
            <div class="container d-flex flex-wrap align-items-center justify-content-between">

                <a class="navbar-brand text-light fw-bold d-flex align-items-center gap-2 mb-2 mb-sm-0" href="#">
                    <img src="../img/logo-white.png" alt="Logo" height="40" class="d-md-none">
                    <img src="../img/logo-white.png" alt="Logo" height="50" class="d-none d-md-block">
                    <span class="fs-4 fs-md-3 fw-bold tracking-tight d-none d-sm-inline">LogiTrack Agro</span>
                </a>

                <div class="d-flex align-items-center gap-3">
                    <div class="text-light text-end d-none d-md-block">
                        <span class="fw-bold" id="nombreUsuario">Cargando...</span>
                        <small class="opacity-75 d-block lh-1 text-capitalize" style="font-size: 0.75rem;"
                            id="rolUsuario">Cargando...</small>
                    </div>

                    <button
                        class="btn btn-outline-warning btn-sm fw-semibold px-2 px-md-3 py-1 py-md-2 d-flex align-items-center"
                        id="btnCerrarSesion">
                        <i class="bi bi-box-arrow-right me-2"></i>
                        <span>Cerrar sesión</span>
                    </button>
                </div>

                <div class="w-100 d-md-none mt-2 text-light text-center border-top border-light border-opacity-10 pt-2">
                    <small class="fw-bold" id="nombreUsuarioMovil">Cargando...</small> -
                    <small class="opacity-75 text-capitalize" id="rolUsuarioMovil">Cargando...</small>
                </div>

            </div>
        </nav>
    </header>

    <main class="container py-4 flex-grow-1">
        <div id="pantallaVacia" class="text-center py-5 d-none">
            <i class="bi bi-truck-flatbed display-1 text-muted opacity-25"></i>
            <h4 class="mt-4 fw-bold text-dark">No tienes viajes activos</h4>
            <p class="text-muted">Cuando se te asigne una carga, aparecerá aquí.</p>
        </div>

        <div id="pantallaViaje" class="d-none">
            <div class="card border-0 shadow-sm rounded-4 mb-4 overflow-hidden">
                <div
                    class="bg-primary bg-opacity-10 p-3 border-bottom d-flex justify-content-between align-items-center">
                    <span class="badge bg-primary rounded-pill px-3" id="badgeEstado">---</span>
                    <small class="fw-bold text-primary" id="txtIdEnvio">#---</small>
                </div>
                <div class="card-body p-4">
                    <div class="mb-4">
                        <label class="small text-muted fw-bold text-uppercase d-block mb-1">Origen de Carga</label>
                        <h5 class="fw-bold mb-0" id="txtOrigen">---</h5>
                        <p class="small text-muted mb-0" id="txtDireccionOrigen">---</p>
                    </div>
                    <div class="mb-0">
                        <label class="small text-muted fw-bold text-uppercase d-block mb-1">Destino Final</label>
                        <h5 class="fw-bold mb-0" id="txtDestino">---</h5>
                        <p class="small text-muted mb-0" id="txtDireccionDestino">---</p>
                    </div>
                </div>
            </div>

            <div class="d-grid gap-3">
                <button id="btnAccionPrincipal"
                    class="btn btn-success btn-lg py-3 fw-bold shadow rounded-4 text-uppercase tracking-wider">
                    Cargando información...
                </button>
                <button class="btn btn-outline-danger py-3 fw-bold rounded-4 border-2" data-bs-toggle="offcanvas"
                    data-bs-target="#panelIncidencias">
                    <i class="bi bi-exclamation-triangle-fill me-2"></i> Reportar Incidencia
                </button>
            </div>
        </div>
    </main>

    <div class="offcanvas offcanvas-bottom rounded-top-5 h-75" tabindex="-1" id="panelIncidencias">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title fw-bold text-danger"><i class="bi bi-megaphone me-2"></i>Nueva Incidencia</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
        </div>
        <div class="offcanvas-body">
            <p class="text-muted small">Describe brevemente lo ocurrido en la ruta. El operador recibirá esta alerta.
            </p>
            <textarea id="txtIncidencia" class="form-control bg-light border-0 rounded-4 p-3 mb-4" rows="6"
                placeholder="Ej: Demora por corte en Ruta 33..."></textarea>
            <div class="d-grid">
                <button id="btnEnviarIncidencia" class="btn btn-danger btn-lg py-3 fw-bold rounded-4">
                    Enviar Reporte
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/config.js"></script>
    <script src="../js/sesion.js"></script>
    <script src="../js/viajeChofer.js"></script>
</body>

</html>
